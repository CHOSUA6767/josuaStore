<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>중고 장터</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Mobile app like layout constraint for desktop */
        body {
            background-color: #f3f4f6; /* bg-gray-100 */
        }
        .app-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            overflow: hidden; /* Prevent scrolling outside app container */
        }
        /* Hide scrollbar for cleaner look */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
</head>
<body class="text-gray-800 font-sans">

    <div class="app-container flex flex-col h-screen relative">
        
        <!-- Header -->
        <header class="sticky top-0 bg-white border-b border-gray-200 z-10 px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <h1 class="text-xl font-bold text-[#83f5cb]">우리동네 장터</h1>
            </div>
            <div class="flex items-center gap-4 text-gray-700">
                <button class="hover:bg-gray-100 p-1 rounded-full transition"><span class="material-symbols-outlined">search</span></button>
                <button class="hover:bg-gray-100 p-1 rounded-full transition"><span class="material-symbols-outlined">menu</span></button>
            </div>
        </header>

        <!-- Main Content (Item List) -->
        <main id="itemList" class="flex-1 overflow-y-auto pb-20">
            <!-- JavaScript가 이곳에 상품 목록을 렌더링합니다 -->
        </main>

        <!-- Floating Action Button (FAB) -->
        <button id="fabBtn" class="absolute bottom-6 right-6 bg-[#83f5cb] text-white p-4 rounded-full shadow-lg hover:bg-[#6bd6ad] transition flex items-center justify-center z-20">
            <span class="material-symbols-outlined">add</span>
        </button>

        <!-- Add Item Modal -->
        <div id="addModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50">
            <div class="bg-white w-full max-w-md mx-4 rounded-xl shadow-2xl flex flex-col max-h-[90vh]">
                <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                    <h3 class="text-lg font-bold">내 물건 팔기</h3>
                    <button id="closeModalBtn" class="text-gray-500 hover:text-gray-800">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
                <div class="p-6 overflow-y-auto flex-1">
                    <form id="addItemForm" class="flex flex-col gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">상품 이미지</label>
                            <div class="w-20 h-20 border-2 border-dashed border-gray-300 rounded-lg flex items-center justify-center text-gray-400 cursor-pointer hover:bg-gray-50">
                                <span class="material-symbols-outlined">add_a_photo</span>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">제목</label>
                            <input type="text" id="itemTitle" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:border-[#83f5cb] focus:ring-1 focus:ring-[#83f5cb]" placeholder="상품 제목을 입력하세요">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">가격 (원)</label>
                            <input type="number" id="itemPrice" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:border-[#83f5cb] focus:ring-1 focus:ring-[#83f5cb]" placeholder="가격을 입력하세요">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">자세한 설명</label>
                            <textarea id="itemDesc" rows="4" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:border-[#83f5cb] focus:ring-1 focus:ring-[#83f5cb] resize-none" placeholder="상품에 대한 자세한 설명을 적어주세요"></textarea>
                        </div>
                    </form>
                </div>
                <div class="px-6 py-4 border-t border-gray-200 flex justify-end">
                    <button id="submitBtn" class="bg-[#83f5cb] text-white px-6 py-2 rounded-lg font-medium hover:bg-[#6bd6ad] transition w-full">작성 완료</button>
                </div>
            </div>
        </div>

        <!-- Detail Page (Full Screen Overlay) -->
        <div id="detailPage" class="hidden absolute inset-0 z-40 bg-white flex flex-col h-full overflow-hidden transition-transform transform translate-x-full">
            <header class="absolute top-0 w-full z-50 p-4 flex justify-between items-center">
                <button id="closeDetailBtn" class="bg-black bg-opacity-40 text-white p-2 rounded-full hover:bg-opacity-60 transition flex items-center justify-center">
                    <span class="material-symbols-outlined text-lg">arrow_back</span>
                </button>
            </header>
            <div class="flex-1 overflow-y-auto pb-20">
                <div id="detailImageContainer" class="w-full h-80 bg-gray-200 flex items-center justify-center">
                    <!-- Image inserted by JS -->
                </div>
                <div class="p-4 border-b border-gray-100 flex items-center gap-3">
                    <div class="w-12 h-12 bg-gray-200 rounded-full flex items-center justify-center text-gray-500 overflow-hidden">
                        <span class="material-symbols-outlined text-3xl">face</span>
                    </div>
                    <div class="flex-1">
                        <p class="font-bold text-md text-gray-900">동네주민</p>
                        <p class="text-xs text-gray-500" id="detailLocation">위치 정보</p>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-bold text-[#83f5cb]">75 bpm</p>
                        <div class="w-12 h-1 bg-gray-200 rounded-full mt-1">
                            <div class="w-1/2 h-full bg-[#83f5cb] rounded-full"></div>
                        </div>
                    </div>
                </div>
                <div class="p-4">
                    <h2 id="detailTitle" class="text-xl font-bold text-gray-900">상품 제목</h2>
                    <p class="text-sm text-gray-500 mt-1 mb-6" id="detailTime">시간</p>
                    <p id="detailDesc" class="text-gray-800 whitespace-pre-wrap leading-relaxed text-[15px]">상품 설명</p>
                </div>
            </div>
            
            <!-- Detail Bottom Bar -->
            <div class="absolute bottom-0 w-full bg-white px-4 py-3 border-t border-gray-200 flex justify-between items-center z-50">
                <div class="flex items-center gap-4">
                    <button class="text-gray-400 hover:text-red-500 transition border-r border-gray-200 pr-4 flex flex-col items-center">
                        <span class="material-symbols-outlined">favorite</span>
                    </button>
                    <div>
                        <p id="detailPrice" class="text-lg font-bold text-gray-900">가격</p>
                        <p class="text-xs text-[#83f5cb] font-bold">가격 제안 불가</p>
                    </div>
                </div>
                <button class="bg-[#83f5cb] text-white px-5 py-2 rounded-md font-bold hover:bg-[#6bd6ad] transition">채팅하기</button>
            </div>
        </div>

    </div>

    <script>
        // 초기 더미 데이터 설정
        const defaultItems = [
            {
                id: 1, title: "아이패드 프로 4세대 11인치 팝니다", price: 650000, 
                desc: "기스 없이 깨끗하게 사용했습니다.\n박스 풀세트로 드립니다.\n직거래 선호합니다.", 
                location: "강남구 역삼동", time: "2시간 전", 
                imgUrl: "https://picsum.photos/seed/item1/600/600", likes: 12
            },
            {
                id: 2, title: "캠핑 의자 2개 세트 (상태 A급)", price: 30000, 
                desc: "두 번 사용한 캠핑 의자입니다.\n접이식이라 보관이 편해요.", 
                location: "서초구 방배동", time: "5시간 전", 
                imgUrl: "https://picsum.photos/seed/item2/600/600", likes: 3
            },
            {
                id: 3, title: "스투키 화분 인테리어용", price: 15000, 
                desc: "공기 정화에 좋은 스투키입니다.\n방 인테리어용으로 예뻐요!", 
                location: "송파구 잠실동", time: "1일 전", 
                imgUrl: "https://picsum.photos/seed/item3/600/600", likes: 0
            },
            {
                id: 4, title: "나이키 운동화 265mm 한 번 신음", price: 45000, 
                desc: "사이즈 미스로 한 번 신고 모셔둔 운동화입니다.\n상태 거의 새것입니다.", 
                location: "강동구 천호동", time: "2일 전", 
                imgUrl: "https://picsum.photos/seed/item4/600/600", likes: 5
            }
        ];

        // 1. LocalStorage에서 데이터 불러오기 (없으면 더미 데이터 저장)
        function loadItems() {
            const storedData = localStorage.getItem('myStoreItems');
            if (storedData) {
                return JSON.parse(storedData);
            } else {
                localStorage.setItem('myStoreItems', JSON.stringify(defaultItems));
                return defaultItems;
            }
        }

        // 2. LocalStorage에 데이터 저장하기
        function saveItems(itemsArray) {
            localStorage.setItem('myStoreItems', JSON.stringify(itemsArray));
        }

        let itemsData = loadItems();

        // DOM 요소 연결
        const itemListEl = document.getElementById('itemList');
        const fabBtn = document.getElementById('fabBtn');
        const addModal = document.getElementById('addModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const submitBtn = document.getElementById('submitBtn');

        // 상세 페이지 DOM 요소 연결
        const detailPage = document.getElementById('detailPage');
        const closeDetailBtn = document.getElementById('closeDetailBtn');
        const detailImageContainer = document.getElementById('detailImageContainer');
        const detailTitle = document.getElementById('detailTitle');
        const detailPrice = document.getElementById('detailPrice');
        const detailDesc = document.getElementById('detailDesc');
        const detailLocation = document.getElementById('detailLocation');
        const detailTime = document.getElementById('detailTime');

        // 3. 상품 목록 화면에 그리기 (최신순)
        function renderItems() {
            itemListEl.innerHTML = ''; // 기존 목록 비우기
            
            // ID(작성 시간) 기준으로 내림차순 정렬하여 최신 글이 위로 오게 함
            const sortedItems = [...itemsData].sort((a, b) => b.id - a.id);
            
            sortedItems.forEach(item => {
                const formattedPrice = item.price === 0 ? '나눔' : Number(item.price).toLocaleString() + '원';
                const imageHtml = item.imgUrl 
                    ? `<img src="${item.imgUrl}" alt="상품" class="w-full h-full object-cover">`
                    : `<span class="text-gray-400 material-symbols-outlined text-4xl">image</span>`;
                
                const article = document.createElement('article');
                article.className = 'flex px-4 py-4 border-b border-gray-100 cursor-pointer hover:bg-gray-50 transition';
                
                // 클릭 시 상세 페이지 열기 이벤트 추가
                article.onclick = () => openDetailPage(item.id);
                
                article.innerHTML = `
                    <div class="w-28 h-28 bg-gray-200 rounded-md flex-shrink-0 overflow-hidden relative flex items-center justify-center">
                        ${imageHtml}
                    </div>
                    <div class="ml-4 flex flex-col justify-center flex-1">
                        <h2 class="text-lg font-medium text-gray-900 line-clamp-2">${item.title}</h2>
                        <p class="text-sm text-gray-500 mt-1">${item.location} · ${item.time}</p>
                        <div class="mt-2 flex justify-between items-end">
                            <p class="text-lg font-bold">${formattedPrice}</p>
                            ${item.likes > 0 ? `<div class="flex items-center text-gray-400 gap-1 text-sm"><span class="material-symbols-outlined text-[16px]">favorite</span> ${item.likes}</div>` : ''}
                        </div>
                    </div>
                `;
                itemListEl.appendChild(article);
            });
        }

        // 4. 상세 페이지 열기 로직
        function openDetailPage(itemId) {
            const item = itemsData.find(i => i.id === itemId);
            if (!item) return;

            // 상세 데이터 채워넣기
            detailTitle.textContent = item.title;
            detailPrice.textContent = item.price === 0 ? '나눔' : Number(item.price).toLocaleString() + '원';
            detailDesc.textContent = item.desc;
            detailLocation.textContent = item.location;
            detailTime.textContent = item.time;

            if(item.imgUrl) {
                detailImageContainer.innerHTML = `<img src="${item.imgUrl}" class="w-full h-full object-cover">`;
            } else {
                detailImageContainer.innerHTML = `<span class="text-gray-400 material-symbols-outlined text-6xl">image</span>`;
            }

            // 슬라이드 애니메이션으로 보여주기
            detailPage.classList.remove('hidden');
            // 약간의 딜레이를 주어 transition 적용
            setTimeout(() => {
                detailPage.classList.remove('translate-x-full');
            }, 10);
        }

        // 상세 페이지 닫기 로직
        closeDetailBtn.addEventListener('click', () => {
            detailPage.classList.add('translate-x-full');
            // 애니메이션 종료 후 hidden 처리
            setTimeout(() => {
                detailPage.classList.add('hidden');
            }, 300);
        });


        // 글쓰기 모달 열기/닫기
        fabBtn.addEventListener('click', () => {
            addModal.classList.remove('hidden');
        });

        const closeModal = () => {
            addModal.classList.add('hidden');
        };

        closeModalBtn.addEventListener('click', closeModal);

        // 5. 새 상품 등록 로직
        submitBtn.addEventListener('click', (e) => {
            e.preventDefault();
            
            const titleInput = document.getElementById('itemTitle').value;
            const priceInput = document.getElementById('itemPrice').value;
            const descInput = document.getElementById('itemDesc').value;
            
            if (!titleInput || !priceInput) {
                alert('제목과 가격을 모두 입력해주세요.');
                return;
            }

            const newItem = {
                id: Date.now(), // 고유 ID 생성 (시간 기반이므로 정렬에 사용 가능)
                title: titleInput,
                price: Number(priceInput),
                desc: descInput || "상세 설명이 없습니다.",
                location: "내 위치",
                time: "방금 전",
                imgUrl: null, // 임시: 이미지는 아직 업로드 안 됨
                likes: 0
            };

            // 데이터를 배열에 추가하고, LocalStorage에 저장 후 리렌더링
            itemsData.push(newItem); // renderItems에서 정렬하므로 push 사용 가능
            saveItems(itemsData);
            renderItems();

            closeModal();
            document.getElementById('addItemForm').reset();
        });

        // 초기 실행
        renderItems();

    </script>
</body>
</html>
