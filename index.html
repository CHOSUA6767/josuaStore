<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>중고 장터</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Mobile app like layout constraint for desktop */
        body {
            background-color: #f3f4f6; /* bg-gray-100 */
        }
        .app-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            overflow: hidden; /* Prevent scrolling outside app container */
        }
        /* Hide scrollbar for cleaner look */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
</head>
<body class="text-gray-800 font-sans">

    <div class="app-container flex flex-col h-screen relative">
        
        <!-- Header -->
        <header class="sticky top-0 bg-white border-b border-gray-200 z-10 px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <h1 class="text-xl font-bold text-[#0f766e]">조수아의 장터</h1>
            </div>
            <div class="flex items-center gap-4 text-gray-700">
                <button class="hover:bg-gray-100 p-1 rounded-full transition"><span class="material-symbols-outlined">search</span></button>
                <button class="hover:bg-gray-100 p-1 rounded-full transition"><span class="material-symbols-outlined">menu</span></button>
            </div>
        </header>

        <!-- Main Content (Item List) -->
        <main id="itemList" class="flex-1 overflow-y-auto pb-20">
            <!-- Loading Indicator -->
            <div class="flex justify-center items-center h-full">
                <p class="text-gray-400">데이터를 불러오는 중입니다...</p>
            </div>
        </main>

        <!-- Floating Action Button (FAB) -->
        <button id="fabBtn" class="absolute bottom-6 right-6 bg-[#0f766e] text-white p-4 rounded-full shadow-lg hover:bg-[#115e59] transition flex items-center justify-center z-20">
            <span class="material-symbols-outlined">add</span>
        </button>

        <!-- Add Item Modal -->
        <div id="addModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50">
            <div class="bg-white w-full max-w-md mx-4 rounded-xl shadow-2xl flex flex-col max-h-[90vh]">
                <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                    <h3 class="text-lg font-bold">내 물건 팔기</h3>
                    <button id="closeModalBtn" class="text-gray-500 hover:text-gray-800">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
                <div class="p-6 overflow-y-auto flex-1">
                    <form id="addItemForm" class="flex flex-col gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">상품 이미지</label>
                            <div class="flex items-center gap-4">
                                <label for="imageInput" class="w-20 h-20 border-2 border-dashed border-gray-300 rounded-lg flex items-center justify-center text-gray-400 cursor-pointer hover:bg-gray-50 flex-shrink-0 relative overflow-hidden">
                                    <span class="material-symbols-outlined absolute z-10" id="cameraIcon">add_a_photo</span>
                                    <img id="imagePreview" src="" class="w-full h-full object-cover hidden absolute z-20">
                                </label>
                                <input type="file" id="imageInput" accept="image/*" class="hidden">
                                <p class="text-xs text-gray-500">클릭하여 사진을 추가하세요<br>(선택사항)</p>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">제목</label>
                            <input type="text" id="itemTitle" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:border-[#0f766e] focus:ring-1 focus:ring-[#0f766e]" placeholder="상품 제목을 입력하세요">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">가격 (원)</label>
                            <input type="number" id="itemPrice" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:border-[#0f766e] focus:ring-1 focus:ring-[#0f766e]" placeholder="가격을 입력하세요">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">자세한 설명</label>
                            <textarea id="itemDesc" rows="4" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:border-[#0f766e] focus:ring-1 focus:ring-[#0f766e] resize-none" placeholder="상품에 대한 자세한 설명을 적어주세요"></textarea>
                        </div>
                    </form>
                </div>
                <div class="px-6 py-4 border-t border-gray-200 flex justify-end">
                    <button id="submitBtn" class="bg-[#0f766e] text-white px-6 py-2 rounded-lg font-medium hover:bg-[#115e59] transition w-full">작성 완료</button>
                </div>
            </div>
        </div>

        <!-- Detail Page (Full Screen Overlay) -->
        <div id="detailPage" class="hidden absolute inset-0 z-40 bg-white flex flex-col h-full overflow-hidden transition-transform transform translate-x-full">
            <header class="absolute top-0 w-full z-50 p-4 flex justify-between items-center">
                <button id="closeDetailBtn" class="bg-black bg-opacity-40 text-white p-2 rounded-full hover:bg-opacity-60 transition flex items-center justify-center">
                    <span class="material-symbols-outlined text-lg">arrow_back</span>
                </button>
            </header>
            <div class="flex-1 overflow-y-auto pb-20">
                <div id="detailImageContainer" class="w-full h-80 bg-gray-200 flex items-center justify-center">
                    <!-- Image inserted by JS -->
                </div>
                <div class="p-4 border-b border-gray-100 flex items-center gap-3">
                    <div class="w-12 h-12 bg-gray-200 rounded-full flex items-center justify-center text-gray-500 overflow-hidden">
                        <span class="material-symbols-outlined text-3xl">face</span>
                    </div>
                    <div class="flex-1">
                        <p class="font-bold text-md text-gray-900">동네주민</p>
                        <p class="text-xs text-gray-500" id="detailLocation">위치 정보</p>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-bold text-[#0f766e]">75 bpm</p>
                        <div class="w-12 h-1 bg-gray-200 rounded-full mt-1">
                            <div class="w-1/2 h-full bg-[#0f766e] rounded-full"></div>
                        </div>
                    </div>
                </div>
                <div class="p-4">
                    <h2 id="detailTitle" class="text-xl font-bold text-gray-900">상품 제목</h2>
                    <p class="text-sm text-gray-500 mt-1 mb-6" id="detailTime">시간</p>
                    <p id="detailDesc" class="text-gray-800 whitespace-pre-wrap leading-relaxed text-[15px]">상품 설명</p>
                </div>
                
                <!-- Comments Section -->
                <div class="p-4 border-t border-gray-100 bg-gray-50 min-h-[200px]">
                    <h3 class="font-bold text-gray-900 mb-4">댓글 <span id="commentCount" class="text-[#0f766e]">0</span></h3>
                    <div id="commentList" class="flex flex-col gap-3 mb-4">
                        <!-- Comments will be rendered here -->
                    </div>
                    <div class="flex flex-col gap-2">
                        <input type="text" id="nicknameInput" class="w-1/3 min-w-[100px] border border-gray-300 rounded-full px-4 py-1.5 focus:outline-none focus:border-[#0f766e] text-sm" placeholder="닉네임 (선택)">
                        <div class="flex gap-2">
                            <input type="text" id="commentInput" class="flex-1 border border-gray-300 rounded-full px-4 py-2 focus:outline-none focus:border-[#0f766e] text-sm" placeholder="댓글을 남겨보세요...">
                            <button id="commentSubmitBtn" class="bg-[#0f766e] text-white px-4 py-2 rounded-full text-sm font-bold hover:bg-[#115e59] transition flex-shrink-0">등록</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Detail Bottom Bar -->
            <div class="absolute bottom-0 w-full bg-white px-4 py-3 border-t border-gray-200 flex justify-between items-center z-50">
                <div class="flex items-center gap-4">
                    <button id="likeBtn" class="text-gray-400 hover:text-red-500 transition border-r border-gray-200 pr-4 flex flex-col items-center">
                        <span class="material-symbols-outlined">favorite</span>
                        <span id="likeCount" class="text-xs mt-1 hidden">0</span>
                    </button>
                    <div>
                        <p id="detailPrice" class="text-lg font-bold text-gray-900">가격</p>
                        <p class="text-xs text-[#0f766e] font-bold">가격 제안 불가</p>
                    </div>
                </div>
                <button onclick="window.open('https://open.kakao.com/o/sswqq6gi', '_blank')" class="bg-[#0f766e] text-white px-5 py-2 rounded-md font-bold hover:bg-[#115e59] transition">채팅하기</button>
            </div>
        </div>

    </div>

    <!-- Firebase JS SDK (Module 버전 사용) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

        // 사용자가 제공한 Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyC6h8VDHxBEGV6qvTM9GNfHzzvmnsUU1OY",
            authDomain: "josua-store.firebaseapp.com",
            projectId: "josua-store",
            storageBucket: "josua-store.firebasestorage.app",
            messagingSenderId: "63866058689",
            appId: "1:63866058689:web:8c64fc5c155e5c92a3a140",
            measurementId: "G-WHH7CY9SE2"
        };

        // Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        
        // 데이터베이스 컬렉션(폴더) 지정
        const itemsCol = collection(db, "items");

        let itemsData = [];
        let currentOpenItemId = null; // 현재 열려있는 상세 페이지의 아이템 ID
        let uploadedImageFile = null; // 업로드할 실제 파일 객체

        // 댓글 DOM 요소
        const commentList = document.getElementById('commentList');
        const commentInput = document.getElementById('commentInput');
        const nicknameInput = document.getElementById('nicknameInput');
        const commentSubmitBtn = document.getElementById('commentSubmitBtn');
        const commentCount = document.getElementById('commentCount');
        
        // 이전에 사용한 닉네임이 있다면 불러오기
        nicknameInput.value = localStorage.getItem('myNickname') || '';

        // 이미지 파일 선택 시 미리보기 처리
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const cameraIcon = document.getElementById('cameraIcon');

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                uploadedImageFile = file; // 파일을 나중에 업로드하기 위해 저장

                // 미리보기를 위한 URL 생성
                const reader = new FileReader();
                reader.onload = (event) => {
                    imagePreview.src = event.target.result;
                    imagePreview.classList.remove('hidden');
                    cameraIcon.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        // DOM 요소 연결
        const itemListEl = document.getElementById('itemList');
        const fabBtn = document.getElementById('fabBtn');
        const addModal = document.getElementById('addModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const submitBtn = document.getElementById('submitBtn');

        // 상세 페이지 DOM 요소 연결
        const detailPage = document.getElementById('detailPage');
        const closeDetailBtn = document.getElementById('closeDetailBtn');
        const detailImageContainer = document.getElementById('detailImageContainer');
        const detailTitle = document.getElementById('detailTitle');
        const detailPrice = document.getElementById('detailPrice');
        const detailDesc = document.getElementById('detailDesc');
        const detailLocation = document.getElementById('detailLocation');
        const detailTime = document.getElementById('detailTime');

        // [중요] 실시간 데이터 가져오기 및 렌더링 (최신순)
        const q = query(itemsCol, orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            itemsData = [];
            snapshot.forEach((doc) => {
                itemsData.push({ id: doc.id, ...doc.data() });
            });
            renderItems();
            
            // 상세 페이지가 열려있을 때 실시간 댓글 업데이트
            if (currentOpenItemId && !detailPage.classList.contains('hidden')) {
                const currentItem = itemsData.find(i => i.id === currentOpenItemId);
                if (currentItem) renderComments(currentItem);
            }
        }, (error) => {
            console.error("데이터 불러오기 실패:", error);
            alert("게시물을 불러오지 못했습니다. 파이어베이스 규칙(Rules) 설정이 안 되어 있을 확률이 높습니다!");
            itemListEl.innerHTML = '<div class="flex justify-center items-center h-full"><p class="text-red-500">데이터베이스 접근 권한이 없습니다.</p></div>';
        });

        // 상품 목록 화면에 그리기
        function renderItems() {
            itemListEl.innerHTML = ''; 
            
            if(itemsData.length === 0) {
                itemListEl.innerHTML = '<div class="flex justify-center items-center h-full"><p class="text-gray-400">첫 상품을 등록해보세요!</p></div>';
                return;
            }
            
            itemsData.forEach(item => {
                const formattedPrice = item.price === 0 ? '나눔' : Number(item.price).toLocaleString() + '원';
                const imageHtml = item.imgUrl 
                    ? `<img src="${item.imgUrl}" alt="상품" class="w-full h-full object-cover">`
                    : `<span class="text-gray-400 material-symbols-outlined text-4xl">image</span>`;
                
                const article = document.createElement('article');
                article.className = 'flex px-4 py-4 border-b border-gray-100 cursor-pointer hover:bg-gray-50 transition';
                
                article.onclick = () => openDetailPage(item.id);
                
                const commentCountNum = (item.comments || []).length;
                const likesHtml = item.likes > 0 ? `<div class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">favorite</span> ${item.likes}</div>` : '';
                const commentsHtml = commentCountNum > 0 ? `<div class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">chat_bubble</span> ${commentCountNum}</div>` : '';
                
                const statsHtml = (likesHtml || commentsHtml) ? 
                    `<div class="flex items-center text-gray-400 gap-2 text-sm">${commentsHtml}${likesHtml}</div>` : '';

                article.innerHTML = `
                    <div class="w-28 h-28 bg-gray-200 rounded-md flex-shrink-0 overflow-hidden relative flex items-center justify-center">
                        ${imageHtml}
                    </div>
                    <div class="ml-4 flex flex-col justify-center flex-1">
                        <h2 class="text-lg font-medium text-gray-900 line-clamp-2">${item.title}</h2>
                        <p class="text-sm text-gray-500 mt-1">${item.location} · 방금 전</p>
                        <div class="mt-2 flex justify-between items-end">
                            <p class="text-lg font-bold">${formattedPrice}</p>
                            ${statsHtml}
                        </div>
                    </div>
                `;
                itemListEl.appendChild(article);
            });
        }

        // 댓글 렌더링 함수
        function renderComments(item) {
            commentList.innerHTML = '';
            const comments = item.comments || [];
            commentCount.textContent = comments.length;
            
            if (comments.length === 0) {
                commentList.innerHTML = '<p class="text-sm text-gray-400 text-center py-4">아직 댓글이 없습니다. 첫 댓글을 남겨보세요!</p>';
                return;
            }

            const myCommentIds = JSON.parse(localStorage.getItem('myCommentIds') || '[]');

            comments.forEach(c => {
                const div = document.createElement('div');
                div.className = 'bg-white p-3 rounded-lg shadow-sm border border-gray-100 relative group';
                const timeString = c.createdAt ? new Date(c.createdAt).toLocaleString() : '방금 전';
                
                // 내가 작성한 댓글이면 삭제 버튼 표시
                const deleteBtnHtml = myCommentIds.includes(c.id) 
                    ? `<button onclick="deleteComment('${item.id}', '${c.id}')" class="absolute top-2 right-2 text-gray-300 hover:text-red-500 transition"><span class="material-symbols-outlined text-[18px]">delete</span></button>`
                    : '';

                div.innerHTML = `
                    <div class="flex items-center gap-2 mb-1 pr-6">
                        <div class="w-6 h-6 bg-gray-200 rounded-full flex items-center justify-center overflow-hidden flex-shrink-0">
                            <span class="material-symbols-outlined text-sm text-gray-500">face</span>
                        </div>
                        <span class="font-bold text-xs text-gray-700">${c.author}</span>
                        <span class="text-[10px] text-gray-400 ml-auto">${timeString}</span>
                    </div>
                    <p class="text-sm text-gray-800 pl-8 pr-4 break-words">${c.text}</p>
                    ${deleteBtnHtml}
                `;
                commentList.appendChild(div);
            });
        }

        // 글로벌 스코프에 댓글 삭제 함수 노출 (인라인 onclick 이벤트용)
        window.deleteComment = async function(itemId, commentId) {
            if (!confirm("이 댓글을 삭제하시겠습니까?")) return;
            
            const item = itemsData.find(i => i.id === itemId);
            if (!item) return;
            
            const commentToDelete = item.comments.find(c => c.id === commentId);
            if (!commentToDelete) return;

            try {
                const itemRef = doc(db, "items", itemId);
                await updateDoc(itemRef, {
                    comments: arrayRemove(commentToDelete)
                });
                
                // 로컬 스토리지에서도 삭제 (선택사항)
                let myCommentIds = JSON.parse(localStorage.getItem('myCommentIds') || '[]');
                myCommentIds = myCommentIds.filter(id => id !== commentId);
                localStorage.setItem('myCommentIds', JSON.stringify(myCommentIds));
                
            } catch (error) {
                console.error("댓글 삭제 실패:", error);
                alert("댓글 삭제에 실패했습니다.");
            }
        };

        // 상세 페이지 열기 로직
        function openDetailPage(itemId) {
            const item = itemsData.find(i => i.id === itemId);
            if (!item) return;

            currentOpenItemId = itemId; // 현재 열린 아이템 ID 저장

            detailTitle.textContent = item.title;
            detailPrice.textContent = item.price === 0 ? '나눔' : Number(item.price).toLocaleString() + '원';
            detailDesc.textContent = item.desc;
            detailLocation.textContent = item.location;
            detailTime.textContent = item.createdAt ? new Date(item.createdAt.toDate()).toLocaleString() : "방금 전";

            if(item.imgUrl) {
                detailImageContainer.innerHTML = `<img src="${item.imgUrl}" class="w-full h-full object-cover">`;
            } else {
                detailImageContainer.innerHTML = `<span class="text-gray-400 material-symbols-outlined text-6xl">image</span>`;
            }

            // 좋아요 버튼 UI 초기화
            const likeBtn = document.getElementById('likeBtn');
            const likeCountEl = document.getElementById('likeCount');
            
            // 로컬 스토리지에서 내가 이 글을 좋아요 했는지 확인
            const likedItems = JSON.parse(localStorage.getItem('likedItems') || '[]');
            const isLiked = likedItems.includes(itemId);

            if (isLiked) {
                likeBtn.classList.remove('text-gray-400');
                likeBtn.classList.add('text-red-500');
                likeBtn.querySelector('span').classList.add('font-solid'); // 아이콘 꽉 차게 변경하는 CSS 클래스라고 가정 (Material Symbols에선 font-variation으로 해야함)
                likeBtn.querySelector('span').style.fontVariationSettings = "'FILL' 1";
            } else {
                likeBtn.classList.remove('text-red-500');
                likeBtn.classList.add('text-gray-400');
                likeBtn.querySelector('span').style.fontVariationSettings = "'FILL' 0";
            }

            if (item.likes > 0) {
                likeCountEl.textContent = item.likes;
                likeCountEl.classList.remove('hidden');
            } else {
                likeCountEl.classList.add('hidden');
            }

            renderComments(item);

            detailPage.classList.remove('hidden');
            setTimeout(() => {
                detailPage.classList.remove('translate-x-full');
            }, 10);
        }

        closeDetailBtn.addEventListener('click', () => {
            detailPage.classList.add('translate-x-full');
            setTimeout(() => {
                detailPage.classList.add('hidden');
            }, 300);
        });

        // 좋아요 기능 로직
        const likeBtn = document.getElementById('likeBtn');
        likeBtn.addEventListener('click', async () => {
            if (!currentOpenItemId) return;
            
            const item = itemsData.find(i => i.id === currentOpenItemId);
            if (!item) return;

            let likedItems = JSON.parse(localStorage.getItem('likedItems') || '[]');
            const isLiked = likedItems.includes(currentOpenItemId);
            
            const itemRef = doc(db, "items", currentOpenItemId);
            
            // UI 즉시 업데이트 (Optimistic UI)
            const likeCountEl = document.getElementById('likeCount');
            
            try {
                if (isLiked) {
                    // 좋아요 취소
                    likedItems = likedItems.filter(id => id !== currentOpenItemId);
                    localStorage.setItem('likedItems', JSON.stringify(likedItems));
                    
                    likeBtn.classList.remove('text-red-500');
                    likeBtn.classList.add('text-gray-400');
                    likeBtn.querySelector('span').style.fontVariationSettings = "'FILL' 0";
                    
                    const newLikes = Math.max(0, item.likes - 1);
                    if (newLikes > 0) {
                        likeCountEl.textContent = newLikes;
                    } else {
                        likeCountEl.classList.add('hidden');
                    }
                    
                    await updateDoc(itemRef, { likes: newLikes });
                    
                } else {
                    // 좋아요 추가
                    likedItems.push(currentOpenItemId);
                    localStorage.setItem('likedItems', JSON.stringify(likedItems));
                    
                    likeBtn.classList.remove('text-gray-400');
                    likeBtn.classList.add('text-red-500');
                    likeBtn.querySelector('span').style.fontVariationSettings = "'FILL' 1";
                    
                    const newLikes = item.likes + 1;
                    likeCountEl.textContent = newLikes;
                    likeCountEl.classList.remove('hidden');
                    
                    await updateDoc(itemRef, { likes: newLikes });
                }
            } catch (error) {
                console.error("좋아요 업데이트 실패:", error);
                alert("좋아요 처리에 실패했습니다.");
                // 실제 서비스에서는 여기서 UI를 원래대로 되돌려야 함
            }
        });

        // 댓글 등록 로직
        commentSubmitBtn.addEventListener('click', async () => {
            const text = commentInput.value.trim();
            let nickname = nicknameInput.value.trim();
            
            if (!text || !currentOpenItemId) return;

            // 닉네임 저장
            if (nickname) {
                localStorage.setItem('myNickname', nickname);
            } else {
                nickname = "동네주민";
            }

            commentSubmitBtn.disabled = true;
            
            const newCommentId = Date.now().toString() + Math.random().toString(36).substr(2, 9);
            const newComment = {
                id: newCommentId,
                text: text,
                author: nickname,
                createdAt: new Date().toISOString()
            };

            // 작성한 댓글 ID를 로컬스토리지에 저장 (삭제 권한 확인용)
            let myCommentIds = JSON.parse(localStorage.getItem('myCommentIds') || '[]');
            myCommentIds.push(newCommentId);
            localStorage.setItem('myCommentIds', JSON.stringify(myCommentIds));

            try {
                const itemRef = doc(db, "items", currentOpenItemId);
                await updateDoc(itemRef, {
                    comments: arrayUnion(newComment)
                });
                commentInput.value = '';
            } catch (error) {
                console.error("댓글 작성 실패:", error);
                alert("댓글 등록에 실패했습니다.");
            } finally {
                commentSubmitBtn.disabled = false;
            }
        });

        fabBtn.addEventListener('click', () => {
            const password = prompt('관리자 비밀번호를 입력해주세요:');
            if (password === 'josua123') {
                addModal.classList.remove('hidden');
            } else if (password !== null) {
                alert('비밀번호가 틀렸습니다. 관리자만 작성할 수 있습니다.');
            }
        });

        const closeModal = () => {
            addModal.classList.add('hidden');
        };

        closeModalBtn.addEventListener('click', closeModal);

        // 파이어베이스에 새 상품 등록 로직
        submitBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            
            const titleInput = document.getElementById('itemTitle').value;
            const priceInput = document.getElementById('itemPrice').value;
            const descInput = document.getElementById('itemDesc').value;
            
            if (!titleInput || !priceInput) {
                alert('제목과 가격을 모두 입력해주세요.');
                return;
            }

            // 버튼 비활성화 (중복 클릭 방지)
            submitBtn.disabled = true;
            submitBtn.innerText = "등록 중...";

            const locations = ["강남구 역삼동", "서초구 방배동", "송파구 잠실동", "강동구 천호동", "동작구 사당동", "마포구 신천동", "관악구 노량진동"];
            const randomLocation = locations[Math.floor(Math.random() * locations.length)];

            try {
                let finalImgUrl = null;
                
                // 이미지가 선택된 경우 Storage에 먼저 업로드
                if (uploadedImageFile) {
                    submitBtn.innerText = "사진 업로드 중...";
                    const uniqueFilename = `images/${Date.now()}_${uploadedImageFile.name}`;
                    const storageRef = ref(storage, uniqueFilename);
                    
                    const snapshot = await uploadBytes(storageRef, uploadedImageFile);
                    finalImgUrl = await getDownloadURL(snapshot.ref);
                }

                submitBtn.innerText = "데이터 저장 중...";

                const newItem = {
                    title: titleInput,
                    price: Number(priceInput),
                    desc: descInput || "상세 설명이 없습니다.",
                    location: randomLocation,
                    imgUrl: finalImgUrl, 
                    likes: 0,
                    comments: [],
                    createdAt: serverTimestamp() // 서버 시간 기준으로 저장 및 정렬
                };

                // Firestore에 데이터 추가
                await addDoc(itemsCol, newItem);
                
                closeModal();
                document.getElementById('addItemForm').reset();
                // 이미지 미리보기 초기화
                imagePreview.src = "";
                imagePreview.classList.add('hidden');
                cameraIcon.classList.remove('hidden');
                uploadedImageFile = null;
                imageInput.value = "";
                
            } catch (error) {
                console.error("데이터 추가 실패: ", error);
                alert("등록에 실패했습니다. (데이터베이스 권한 설정을 확인하세요)");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "작성 완료";
            }
        });

    </script>
</body>
</html>
